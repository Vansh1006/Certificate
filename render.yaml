services:
  - type: web
    name: ndisk-blockchain-infrastructure
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: CONTRACT_ADDRESS
        value: 0x475726220A3EB115524D12939f45Fe9e5cF98913
      - key: AMOY_RPC_URL
        value: https://rpc-amoy.polygon.technology
      - key: IPFS_GATEWAY
        value: https://gateway.pinata.cloud/ipfs
      - key: PUBLIC_APP_URL
        value: https://ndisk-blockchain-infrastructure.onrender.com
      - key: PINATA_JWT
        sync: false
      - key: PINATA_API_KEY
        sync: false
      - key: PINATA_SECRET_API_KEY
        sync: false
      - key: PRIVATE_KEY
        sync: false
